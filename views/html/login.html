<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYONDO Hardware | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/login.css">
</head>
<body class="bg-dark text-light">

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4 login-card">
      <h2 class="text-center mb-3 text-warning">NYONDO Hardware</h2>
      <p class="text-center text-secondary mb-4">Hardware Management System</p>

      <form>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" class="form-control" name="email" id="email" placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" name="password" id="password" placeholder="Enter your password">
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-warning">Log In</button>
        </div>

        <div class="text-center">
          <a href="#" class="text-decoration-none text-info">Forgot Password?</a>
        </div>
      </form>

      <hr class="text-secondary">
      <p class="text-center">Don’t have an account? <a href="#" class="text-decoration-none text-primary">Sign Up</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
